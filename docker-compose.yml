version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: stock_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret_password
      MYSQL_DATABASE: stock-db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_USER=root
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=stock-db
      - JWT_SECRET=your-super-secret-jwt-key
      - PORT=8080
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
    container_name: stock_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
